; PlatformIO Project Configuration File for ESPectre Arduino
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_esp32s3_revtft]
platform = espressif32
board = adafruit_feather_esp32s3_revtft
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1

; Library dependencies
lib_deps =
    adafruit/Adafruit ST7789@^1.10.0
    adafruit/Adafruit GFX Library@^1.11.0
    adafruit/Adafruit NeoPixel@^1.12.0

; Upload settings
upload_speed = 921600
upload_port = /dev/cu.usbmodem*  ; Adjust for your system

; Partitions (use default for now)
; board_build.partitions = partitions.csv
